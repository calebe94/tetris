name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: [docs/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Job 1: caminho oficial (actions/deploy-pages) — funciona SE Pages
  # estiver habilitado em Settings > Pages > Source: "GitHub Actions".
  deploy-official:
    if: false  # desabilitado por padrão; habilite após configurar source nas settings
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4

  # Job 2: caminho legacy (peaceiris/actions-gh-pages) — publica via push
  # para branch `gh-pages`. Funciona SEM nenhuma config manual no repo.
  # Para usar, abra https://github.com/calebe94/tetris/settings/pages,
  # escolha Source: "Deploy from a branch" > Branch: gh-pages > / (root), Save.
  deploy-legacy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # peaceiris/actions-gh-pages precisa pushar na gh-pages
      pages: write      # necessário pra POST /repos/{owner}/{repo}/pages
    steps:
      - uses: actions/checkout@v4

      - name: Try to enable Pages (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tenta habilitar Pages. Ignora erro se já estiver habilitado (409) ou se a config já existir.
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' || true)
          echo "Pages enable response: $HTTP_CODE"
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "409" ] || [ "$HTTP_CODE" = "422" ]; then
            echo "Pages enabled or already configured"
          else
            echo "::warning::Unexpected status: $HTTP_CODE. Continuing anyway."
          fi

      - name: Prepare gh-pages tree
        run: |
          # docs/ já é a raiz do site — copia direto
          rm -rf _site
          cp -r docs _site
          # .nojekyll já está em docs/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: gh-pages from ${{ github.sha }}"

      - name: Trigger Pages redeploy
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5
          gh api -X POST /repos/${{ github.repository }}/pages/builds || echo "(redeploy trigger skipped — Pages may not be enabled yet)"

name: Enable GitHub Pages

on:
  workflow_dispatch:

permissions:
  pages: write
  contents: read

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages (gh-pages branch, / root)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST /repos/${{ github.repository }}/pages \
            -f source[branch]=gh-pages \
            -f source[path]=/

      - name: Report status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Pages configuration:"
          gh api /repos/${{ github.repository }}/pages || echo "(no config yet)"

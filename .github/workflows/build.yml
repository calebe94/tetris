name: Build and Release Game

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-gfx-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libsdl2-image-2.0-0

      - name: Install Emscripten SDK
        run: |
          git clone https://github.com/emscripten-core/emsdk.git $HOME/emsdk
          cd $HOME/emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Build desktop binary
        run: make all

      - name: Build wasm bundle
        run: |
          source $HOME/emsdk/emsdk_env.sh
          make web

      - name: Verify wasm artifacts
        run: |
          test -f wasm/index.html
          test -f wasm/index.js
          test -f wasm/index.wasm
          test -f wasm/index.data
          ls -la wasm/

      - name: Ship wasm to repo root (so GitHub Pages serves /tetris/wasm/)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wasm/index.html wasm/index.js wasm/index.wasm wasm/index.data
          if git diff --cached --quiet; then
            echo "No wasm changes to push"
          else
            git commit -m "chore(pages): ship wasm bundle for ${GITHUB_REF_NAME}"
            git push origin main
          fi

      - name: Compress wasm folder for release
        run: tar czf wasm.tar.gz wasm

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}.
            Play online: https://calebe94.github.io/tetris/play.html
          files: |
            bin/tetris
            wasm.tar.gz
            wasm/index.html
            wasm/index.js
            wasm/index.wasm
            wasm/index.data
